<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MotoTracker v03</title>
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: {} }
    }
  </script>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />

  <style>
    .material-symbols-rounded {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }
    .material-symbols-rounded.w-3\.5 { font-size: 0.875rem; }
    .material-symbols-rounded.w-4 { font-size: 1rem; }
    .material-symbols-rounded.w-5 { font-size: 1.25rem; }
    .material-symbols-rounded.w-6 { font-size: 1.5rem; }
    .material-symbols-rounded.w-7 { font-size: 1.75rem; }
    .material-symbols-rounded.w-8 { font-size: 2rem; }
    .material-symbols-rounded.w-10 { font-size: 2.5rem; }

    .pb-safe { padding-bottom: env(safe-area-inset-bottom, 1rem); }
    .animate-fade-in { animation: fadeIn 0.2s ease-out; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-neutral-950 dark:text-neutral-200">
  
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- CONFIGURAÇÃO DO SUPABASE ---
    const supabaseUrl = 'https://ofgafzebcyjmtxdkgqyy.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9mZ2FmemViY3lqbXR4ZGtncXl5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxMjQwODksImV4cCI6MjA5NDcwMDA4OX0.Xt4XfB3NJ2HKqbjaLsbjOY_WyTND-SubwBHkaPZq3eM';
    const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

    // --- MAPA DE ÍCONES ---
    const MIcon = ({ name, className }) => <span className={`material-symbols-rounded ${className || ''}`}>{name}</span>;
    const Home = (p) => <MIcon name="home" {...p} />;
    const MapIcon = (p) => <MIcon name="map" {...p} />;
    const List = (p) => <MIcon name="list" {...p} />;
    const PlusCircle = (p) => <MIcon name="add_circle" {...p} />;
    const CheckCircle2 = (p) => <MIcon name="check_circle" {...p} />;
    const Trash2 = (p) => <MIcon name="delete" {...p} />;
    const Navigation = (p) => <MIcon name="near_me" {...p} />;
    const Fuel = (p) => <MIcon name="local_gas_station" {...p} />;
    const Clock = (p) => <MIcon name="schedule" {...p} />;
    const Route = (p) => <MIcon name="route" {...p} />;
    const Share2 = (p) => <MIcon name="share" {...p} />;
    const CheckSquare = (p) => <MIcon name="check_box" {...p} />;
    const CloudSun = (p) => <MIcon name="partly_cloudy_day" {...p} />;
    const CloudRain = (p) => <MIcon name="rainy" {...p} />;
    const Sun = (p) => <MIcon name="light_mode" {...p} />;
    const Moon = (p) => <MIcon name="dark_mode" {...p} />;
    const AlertCircle = (p) => <MIcon name="error" {...p} />;
    const X = (p) => <MIcon name="close" {...p} />;
    const Wallet = (p) => <MIcon name="account_balance_wallet" {...p} />;
    const TrendingUp = (p) => <MIcon name="trending_up" {...p} />;
    const PieChart = (p) => <MIcon name="pie_chart" {...p} />;
    const Receipt = (p) => <MIcon name="receipt_long" {...p} />;
    const MapPin = (p) => <MIcon name="location_on" {...p} />;
    const Thermometer = (p) => <MIcon name="device_thermostat" {...p} />;
    const Settings = (p) => <MIcon name="settings" {...p} />;
    const Calendar = (p) => <MIcon name="calendar_month" {...p} />;
    const Group = (p) => <MIcon name="group" {...p} />;
    const TwoWheeler = (p) => <MIcon name="two_wheeler" {...p} />;
    const ExpandMore = (p) => <MIcon name="expand_more" {...p} />;
    const Restaurant = (p) => <MIcon name="restaurant" {...p} />;
    const Hotel = (p) => <MIcon name="hotel" {...p} />;
    const Category = (p) => <MIcon name="category" {...p} />;
    const Build = (p) => <MIcon name="build" {...p} />;

    const ORIGIN_LAT = -3.7327; // Fortaleza
    const ORIGIN_LNG = -38.5270;
    const SAFE_RANGE = 350;

    const motoDatabase = {
      "Yamaha": [ { model: "Fazer 250", consumption: 29 }, { model: "MT-03", consumption: 22 }, { model: "Tenere 250", consumption: 30 }, { model: "Crosser 150", consumption: 38 } ],
      "Honda": [ { model: "CB 300F Twister", consumption: 35 }, { model: "XRE 300", consumption: 26 }, { model: "CG 160 Titan", consumption: 40 }, { model: "Sahara 300", consumption: 30 } ],
      "BMW": [ { model: "G 310 GS", consumption: 25 }, { model: "F 850 GS", consumption: 20 }, { model: "R 1250 GS", consumption: 18 } ],
      "Kawasaki": [ { model: "Ninja 400", consumption: 25 }, { model: "Versys 300", consumption: 24 }, { model: "Z400", consumption: 26 } ],
      "Outra": [ { model: "Modelo Personalizado", consumption: 25 } ]
    };

    const svgPinVisited = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="#22c55e" stroke="#14532d" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 4.993-5.539 10.193-7.399 11.799a1 1 0 0 1-1.202 0C9.539 20.193 4 14.993 4 10a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3" fill="white"/></svg>`;
    const svgPinPlanned = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="#f59e0b" stroke="#78350f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 4.993-5.539 10.193-7.399 11.799a1 1 0 0 1-1.202 0C9.539 20.193 4 14.993 4 10a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3" fill="white"/></svg>`;
    const encodeSvg = (svg) => `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(svg)}`;

    function App() {
      const [theme, setTheme] = useState(() => localStorage.getItem('motoTrackerTheme') || 'dark');
      const [places, setPlaces] = useState([]);
      const [fuelPrice, setFuelPrice] = useState(() => { const saved = localStorage.getItem('fuelPrice'); return saved ? parseFloat(saved) : 5.80; });
      const [myMoto, setMyMoto] = useState(() => { 
        const saved = localStorage.getItem('myMotoConfig'); 
        return saved ? JSON.parse(saved) : { brand: 'Yamaha', model: 'Fazer 250', consumption: 29 }; 
      });

      const [currentView, setCurrentView] = useState('dashboard');
      const [toastMsg, setToastMsg] = useState('');
      const [isDbConnected, setIsDbConnected] = useState(false);
      
      const [isAddModalOpen, setIsAddModalOpen] = useState(false);
      const [expenseModal, setExpenseModal] = useState(false);
      const [finishTripModal, setFinishTripModal] = useState({ isOpen: false, placeId: null, costs: { gas: '', food: '', lodging: '', maintenance: '', others: '' } });
      const [generalExpenses, setGeneralExpenses] = useState(() => { const saved = localStorage.getItem('motoExpenses_v1'); return saved ? JSON.parse(saved) : []; });

      const isDark = theme === 'dark';

      // --- SUPABASE FETCH ---
      useEffect(() => {
        fetchTrips();
      }, []);

      const fetchTrips = async () => {
        const { data, error } = await supabase.from('trips').select('*').order('created_at', { ascending: false });
        if (error) {
          console.error("Erro DB:", error);
          showToast("Falha ao sincronizar com o banco de dados.");
        } else {
          const mappedData = data.map(db => ({
            id: db.id,
            name: db.name,
            city: db.city,
            state: db.state,
            type: db.type,
            status: db.status,
            plannedDate: db.planned_date,
            date: db.date,
            notes: db.notes,
            lat: db.lat,
            lng: db.lng,
            distance: db.distance,
            duration: db.duration,
            fuelCost: db.fuel_cost,
            actualCost: db.actual_cost,
            costDetails: db.cost_details || { gas: 0, food: 0, lodging: 0, maintenance: 0, others: 0 },
            hasPassenger: db.has_passenger
          }));
          setPlaces(mappedData);
          setIsDbConnected(true);
        }
      };

      useEffect(() => { localStorage.setItem('motoExpenses_v1', JSON.stringify(generalExpenses)); }, [generalExpenses]);
      useEffect(() => { localStorage.setItem('fuelPrice', fuelPrice.toString()); }, [fuelPrice]);
      useEffect(() => { localStorage.setItem('myMotoConfig', JSON.stringify(myMoto)); }, [myMoto]);
      useEffect(() => { 
        localStorage.setItem('motoTrackerTheme', theme);
        if (isDark) document.documentElement.classList.add('dark');
        else document.documentElement.classList.remove('dark');
      }, [theme, isDark]);

      const toggleTheme = () => setTheme(prev => prev === 'dark' ? 'light' : 'dark');
      const showToast = (msg) => { setToastMsg(msg); setTimeout(() => setToastMsg(''), 3000); };

      const formatDuration = (minutes) => { const h = Math.floor(minutes / 60); const m = minutes % 60; return h === 0 ? `${m}m` : `${h}h ${m > 0 ? m + 'm' : ''}`; };

      const geocodeLocation = async (city, state) => {
        try {
          const res = await fetch(`https://nominatim.openstreetmap.org/search?city=${city}&state=${state}&country=Brazil&format=json`);
          const data = await res.json();
          if (data && data.length > 0) return { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon) };
        } catch (error) { console.error(error); }
        return null;
      };

      const calculateRouteInfo = async (destLat, destLng, customFuelPrice, vehicleConsumption) => {
        try {
          const url = `https://router.project-osrm.org/route/v1/driving/${ORIGIN_LNG},${ORIGIN_LAT};${destLng},${destLat}?overview=false`;
          const res = await fetch(url);
          const data = await res.json();
          if (data.routes && data.routes.length > 0) {
            const distanceKm = Math.round(data.routes[0].distance / 1000);
            return { 
              distance: distanceKm, 
              duration: formatDuration(Math.round(data.routes[0].duration / 60)), 
              fuelCost: (distanceKm / vehicleConsumption) * customFuelPrice 
            };
          }
        } catch (error) { console.error(error); }
        return { distance: 0, duration: 'N/A', fuelCost: 0 };
      };

      const addPlace = async (newPlace, customFuelPrice) => {
        const coords = await geocodeLocation(newPlace.city || newPlace.name, newPlace.state);
        let routeInfo = { distance: 0, duration: 'N/A', fuelCost: 0 };
        if (coords) routeInfo = await calculateRouteInfo(coords.lat, coords.lng, customFuelPrice, myMoto.consumption);

        const dbRecord = {
          name: newPlace.name,
          city: newPlace.city,
          state: newPlace.state,
          type: newPlace.type,
          status: 'planned',
          planned_date: newPlace.plannedDate,
          has_passenger: newPlace.hasPassenger,
          notes: newPlace.notes,
          lat: coords?.lat || null,
          lng: coords?.lng || null,
          distance: routeInfo.distance,
          duration: routeInfo.duration,
          fuel_cost: routeInfo.fuelCost,
          actual_cost: 0,
          cost_details: { gas: 0, food: 0, lodging: 0, maintenance: 0, others: 0 }
        };

        const { data, error } = await supabase.from('trips').insert([dbRecord]).select();

        if (error) {
          console.error(error);
          showToast("Erro ao salvar no Supabase!");
        } else {
          const savedDbTrip = data[0];
          const savedPlace = {
            id: savedDbTrip.id,
            name: savedDbTrip.name,
            city: savedDbTrip.city,
            state: savedDbTrip.state,
            type: savedDbTrip.type,
            status: savedDbTrip.status,
            plannedDate: savedDbTrip.planned_date,
            hasPassenger: savedDbTrip.has_passenger,
            notes: savedDbTrip.notes,
            lat: savedDbTrip.lat,
            lng: savedDbTrip.lng,
            distance: savedDbTrip.distance,
            duration: savedDbTrip.duration,
            fuelCost: savedDbTrip.fuel_cost,
            actualCost: savedDbTrip.actual_cost,
            costDetails: savedDbTrip.cost_details
          };
          setPlaces([savedPlace, ...places]);
          setIsAddModalOpen(false);
          showToast('Salvo com sucesso na nuvem!');
        }
      };

      const deletePlace = async (id) => { 
        if (confirm('Excluir este destino permanentemente do banco?')) {
          const { error } = await supabase.from('trips').delete().eq('id', id);
          if (error) {
            console.error(error);
            showToast("Erro ao excluir do Supabase!");
          } else {
            setPlaces(places.filter(p => p.id !== id)); 
            showToast("Destino apagado.");
          }
        }
      };

      const deleteGeneralExpense = (id) => { if (confirm('Excluir esta despesa?')) setGeneralExpenses(generalExpenses.filter(e => e.id !== id)); };

      const handleAddExpense = async (e) => {
        e.preventDefault();
        const fd = new FormData(e.target);
        const tripId = fd.get('tripId');
        const category = fd.get('category');
        const amount = parseFloat(fd.get('amount')) || 0;
        const description = fd.get('description') || '';

        if (tripId === 'general') {
          setGeneralExpenses([{ id: Date.now().toString(), category, amount, description, date: new Date().toISOString() }, ...generalExpenses]);
          setExpenseModal(false);
          showToast('Despesa geral salva localmente.');
        } else {
          const p = places.find(x => x.id === tripId);
          const currentCosts = p.costDetails || { gas: 0, food: 0, lodging: 0, maintenance: 0, others: 0 };
          const newCosts = { ...currentCosts, [category]: (currentCosts[category] || 0) + amount };
          const newActualCost = (p.actualCost || 0) + amount;

          const { error } = await supabase.from('trips').update({
              actual_cost: newActualCost,
              cost_details: newCosts
          }).eq('id', tripId);

          if (error) {
            console.error(error);
            showToast("Erro ao atualizar despesas na nuvem!");
          } else {
            setPlaces(places.map(p => p.id === tripId ? { ...p, actualCost: newActualCost, costDetails: newCosts } : p));
            setExpenseModal(false);
            showToast('Despesa vinculada no Supabase!');
          }
        }
      };

      const confirmFinishTrip = async (e) => {
        e.preventDefault();
        const { gas, food, lodging, maintenance, others } = finishTripModal.costs;
        const costDetailsObj = {
            gas: parseFloat(gas) || 0,
            food: parseFloat(food) || 0,
            lodging: parseFloat(lodging) || 0,
            maintenance: parseFloat(maintenance) || 0,
            others: parseFloat(others) || 0
        };
        const total = costDetailsObj.gas + costDetailsObj.food + costDetailsObj.lodging + costDetailsObj.maintenance + costDetailsObj.others;
        const currentDate = new Date().toISOString().split('T')[0];

        const { error } = await supabase.from('trips').update({
            status: 'visited',
            date: currentDate,
            actual_cost: total,
            cost_details: costDetailsObj
        }).eq('id', finishTripModal.placeId);

        if (error) {
            console.error(error);
            showToast("Erro ao concluir viagem na nuvem.");
        } else {
            setPlaces(places.map(p => p.id === finishTripModal.placeId ? { 
                ...p, 
                status: 'visited', 
                date: currentDate, 
                actualCost: total,
                costDetails: costDetailsObj
            } : p));
            setFinishTripModal({ isOpen: false, placeId: null, costs: { gas: '', food: '', lodging: '', maintenance: '', others: '' } });
            showToast('Viagem concluída e salva no DB!');
        }
      };

      const shareTrip = (place) => {
        const text = `🏍️ Partiu ${place.name}?\n📍 Destino: ${place.city || place.name} - ${place.state}\n🛣️ Distância: ${place.distance}km (saindo de Fortaleza)\n⏱️ Tempo: ${place.duration}\n⛽ Custo aprox. ida: R$ ${place.fuelCost?.toFixed(2)}\nBora rodar!`;
        const textArea = document.createElement("textarea");
        textArea.value = text;
        document.body.appendChild(textArea);
        textArea.select();
        try { document.execCommand('copy'); showToast('Copiado para o WhatsApp!'); } catch (err) {}
        document.body.removeChild(textArea);
      };

      // --- COMPONENTES DAS TELAS ---

      const Dashboard = () => {
        const visitedTrips = places.filter(p => p.status === 'visited');
        const plannedTrips = places.filter(p => p.status === 'planned');
        const totalKm = visitedTrips.reduce((acc, curr) => acc + (curr.distance || 0), 0);
        const totalGeneral = generalExpenses.reduce((acc, curr) => acc + curr.amount, 0);
        const totalSpent = visitedTrips.reduce((acc, curr) => acc + (curr.actualCost || 0), 0) + totalGeneral;
        const avgCostPerKm = totalKm > 0 ? (totalSpent / totalKm).toFixed(2) : '0.00';
        
        const nextTrip = plannedTrips.length > 0 ? plannedTrips[0] : null;

        const [homeWeather, setHomeWeather] = useState(null);

        useEffect(() => {
          fetch(`https://api.open-meteo.com/v1/forecast?latitude=${ORIGIN_LAT}&longitude=${ORIGIN_LNG}&current_weather=true&hourly=relativehumidity_2m`)
            .then(res => res.json())
            .then(data => setHomeWeather(data))
            .catch(() => {});
        }, []);

        return (
          <div className="space-y-6 animate-fade-in pb-24 md:pb-0">
            <header className="mb-2">
              <div className="flex items-center gap-3">
                <h1 className="text-3xl font-bold text-slate-800 dark:text-neutral-100 flex items-center gap-3">
                  <Navigation className="text-amber-500 w-8 h-8" />
                  Painel da {myMoto.model}
                </h1>
                {isDbConnected && (
                  <span title="Conectado ao Supabase" className="hidden md:flex text-[10px] font-bold uppercase tracking-widest text-green-600 bg-green-100 dark:bg-green-500/20 dark:text-green-400 px-2.5 py-1 rounded-md items-center gap-1 shadow-sm"><CheckCircle2 className="w-3 h-3" /> Online</span>
                )}
              </div>
              <p className="text-slate-500 dark:text-neutral-400 mt-1">Resumo das suas atividades e planejamento.</p>
            </header>

            <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
              <StatCard value={`${totalKm} km`} label="Rodados (Ida)" icon={Route} color="text-blue-500" />
              <StatCard value={visitedTrips.length} label="Concluídas" icon={CheckCircle2} color="text-green-500" />
              <StatCard value={plannedTrips.length} label="Na Fila" icon={MapPin} color="text-amber-500" />
              <StatCard value={`R$ ${totalSpent.toFixed(0)}`} label="Gasto Total" icon={Wallet} color="text-slate-700 dark:text-neutral-300" />
            </div>

            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
              <div className="md:col-span-2 bg-white dark:bg-neutral-800 border border-slate-200 dark:border-neutral-700 rounded-2xl p-6 shadow-sm dark:shadow-none flex flex-col justify-between">
                <div>
                  <div className="flex items-center gap-2 text-xs font-bold uppercase tracking-wider text-amber-500 mb-4">
                    <Clock className="w-4 h-4" /> Próximo Destino
                  </div>
                  {nextTrip ? (
                    <>
                      <h3 className="text-2xl font-bold text-slate-800 dark:text-neutral-100 mb-1">{nextTrip.name}</h3>
                      <p className="text-slate-500 dark:text-neutral-400 font-medium mb-1">{nextTrip.city || nextTrip.name} - {nextTrip.state}</p>
                      <p className="text-slate-400 dark:text-neutral-500 text-sm mb-6 line-clamp-1">{nextTrip.notes || "Sem anotações de rota."}</p>
                      
                      <div className="flex gap-4 mb-4">
                        <div className="bg-slate-50 dark:bg-neutral-900/50 rounded-xl p-3 flex-1 border border-slate-100 dark:border-neutral-800">
                          <div className="text-xs text-slate-400 mb-1">Distância</div>
                          <div className="font-bold text-slate-700 dark:text-neutral-200">{nextTrip.distance} km</div>
                        </div>
                        <div className="bg-slate-50 dark:bg-neutral-900/50 rounded-xl p-3 flex-1 border border-slate-100 dark:border-neutral-800">
                          <div className="text-xs text-slate-400 mb-1">Tempo Est.</div>
                          <div className="font-bold text-slate-700 dark:text-neutral-200">{nextTrip.duration}</div>
                        </div>
                      </div>
                    </>
                  ) : (
                    <div className="text-center py-8 text-slate-500 dark:text-neutral-500">
                      Nenhuma viagem planejada no momento.<br/>
                      <button onClick={() => setIsAddModalOpen(true)} className="mt-3 text-amber-500 font-medium hover:underline">Adicionar Destino</button>
                    </div>
                  )}
                </div>
                
                {nextTrip && (
                  <button onClick={() => setCurrentView('list')} className="w-full bg-slate-100 dark:bg-neutral-700/50 hover:bg-slate-200 dark:hover:bg-neutral-700 text-slate-700 dark:text-white py-3 rounded-xl text-sm font-bold transition-colors">
                    Ver todos os destinos
                  </button>
                )}
              </div>

              <div className="space-y-6">
                <div className="bg-gradient-to-br from-blue-500 to-blue-600 dark:from-blue-900 dark:to-neutral-800 border border-blue-400 dark:border-neutral-700 rounded-2xl p-6 text-white shadow-sm">
                  <div className="text-xs font-bold uppercase tracking-wider text-blue-100 dark:text-neutral-400 mb-4 flex items-center gap-2">
                    <MapPin className="w-4 h-4" /> Base: Fortaleza, CE
                  </div>
                  
                  {homeWeather ? (
                    <div className="flex items-center justify-between">
                      <div>
                        <div className="text-4xl font-black mb-1">{homeWeather.current_weather.temperature}°C</div>
                        <div className="text-sm text-blue-100 dark:text-neutral-300">Tempo Atual</div>
                      </div>
                      <Thermometer className="w-10 h-10 opacity-80" />
                    </div>
                  ) : (
                    <div className="text-sm opacity-80">Carregando clima...</div>
                  )}
                </div>

                <div className="bg-white dark:bg-neutral-800 border border-slate-200 dark:border-neutral-700 p-6 rounded-2xl shadow-sm dark:shadow-none">
                  <div className="flex justify-between items-center mb-4">
                    <h3 className="font-bold text-slate-800 dark:text-neutral-200 flex items-center gap-2 text-sm">
                      <Fuel className="w-4 h-4 text-amber-500" /> Custo Combustível
                    </h3>
                    <button onClick={() => setCurrentView('settings')} className="text-xs text-amber-500 hover:underline">Alterar Moto</button>
                  </div>
                  
                  <div className="space-y-4">
                    <div className="flex justify-between items-center bg-slate-50 dark:bg-neutral-900 border border-slate-100 dark:border-neutral-800 p-3 rounded-xl">
                      <span className="text-sm text-slate-500 dark:text-neutral-400">Consumo Médio</span>
                      <span className="font-bold text-slate-700 dark:text-neutral-200">{myMoto.consumption} km/L</span>
                    </div>
                    <div className="flex justify-between items-center bg-slate-50 dark:bg-neutral-900 border border-slate-100 dark:border-neutral-800 p-2 rounded-xl pl-3">
                      <span className="text-sm text-slate-500 dark:text-neutral-400">Gasolina (R$)</span>
                      <input 
                        type="number" step="0.01" value={fuelPrice} 
                        onChange={(e) => setFuelPrice(parseFloat(e.target.value) || 0)} 
                        className="w-20 bg-white dark:bg-neutral-800 border border-slate-200 dark:border-neutral-700 rounded-lg px-2 py-1 text-slate-800 dark:text-white focus:border-amber-500 outline-none font-bold text-right" 
                      />
                    </div>
                    <div className="text-[10px] text-slate-400 dark:text-neutral-500 text-center">
                      Custo atual: <strong className="text-amber-500">R$ {avgCostPerKm}/km</strong> rodado.
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        );
      };

      const SettingsView = () => {
        const handleBrandChange = (e) => {
          const newBrand = e.target.value;
          const firstModel = motoDatabase[newBrand][0];
          setMyMoto({
            brand: newBrand,
            model: firstModel.model,
            consumption: firstModel.consumption
          });
        };

        const handleModelChange = (e) => {
          const newModelName = e.target.value;
          const selectedModelObj = motoDatabase[myMoto.brand].find(m => m.model === newModelName);
          if (selectedModelObj) {
            setMyMoto({ ...myMoto, model: newModelName, consumption: selectedModelObj.consumption });
          }
        };

        const handleConsumptionChange = (e) => {
          setMyMoto({ ...myMoto, consumption: parseFloat(e.target.value) || 0 });
        };

        return (
          <div className="space-y-6 animate-fade-in max-w-2xl pb-24 md:pb-0">
            <header className="mb-6">
              <h2 className="text-2xl font-bold text-slate-800 dark:text-neutral-100 flex items-center gap-2">
                <Settings className="text-slate-500 w-7 h-7" /> Configurações da Moto
              </h2>
              <p className="text-sm text-slate-500 dark:text-neutral-400 mt-1">
                Selecione sua moto para base de cálculo de rotas. Você pode editar o consumo livremente.
              </p>
            </header>

            <div className="bg-white dark:bg-neutral-800 border border-slate-200 dark:border-neutral-700 rounded-2xl p-6 shadow-sm dark:shadow-none space-y-5">
              
              <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                <div>
                  <label className="block text-sm font-bold text-slate-700 dark:text-neutral-300 mb-2">Fabricante</label>
                  <select 
                    value={myMoto.brand} 
                    onChange={handleBrandChange}
                    className="w-full bg-slate-50 dark:bg-neutral-900 border border-slate-200 dark:border-neutral-700 rounded-xl p-3.5 text-slate-800 dark:text-white focus:border-amber-500 outline-none"
                  >
                    {Object.keys(motoDatabase).map(brand => (
                      <option key={brand} value={brand}>{brand}</option>
                    ))}
                  </select>
                </div>

                <div>
                  <label className="block text-sm font-bold text-slate-700 dark:text-neutral-300 mb-2">Modelo</label>
                  <select 
                    value={myMoto.model} 
                    onChange={handleModelChange}
                    className="w-full bg-slate-50 dark:bg-neutral-900 border border-slate-200 dark:border-neutral-700 rounded-xl p-3.5 text-slate-800 dark:text-white focus:border-amber-500 outline-none"
                  >
                    {motoDatabase[myMoto.brand].map(m => (
                      <option key={m.model} value={m.model}>{m.model}</option>
                    ))}
                  </select>
                </div>
              </div>

              <div className="pt-4 border-t border-slate-100 dark:border-neutral-700/50">
                <label className="block text-sm font-bold text-slate-700 dark:text-neutral-300 mb-2">Consumo Médio Real (km/L)</label>
                <p className="text-xs text-slate-500 dark:text-neutral-400 mb-3">
                  O valor sugerido é uma média de fábrica. Edite para bater com a realidade da sua {myMoto.model}.
                </p>
                <div className="relative max-w-xs">
                  <input 
                    type="number" 
                    step="0.1" 
                    value={myMoto.consumption} 
                    onChange={handleConsumptionChange}
                    className="w-full bg-slate-50 dark:bg-neutral-900 border border-slate-200 dark:border-neutral-700 rounded-xl p-3.5 pl-4 pr-16 text-slate-800 dark:text-white focus:border-amber-500 outline-none font-bold text-lg"
                  />
                  <span className="absolute right-4 top-3.5 text-slate-400 font-bold">km/L</span>
                </div>
              </div>
            </div>

            <div className="bg-blue-50 dark:bg-blue-900/20 border border-blue-200 dark:border-blue-800/50 rounded-xl p-4 flex gap-3">
              <AlertCircle className="w-5 h-5 text-blue-500 flex-shrink-0" />
              <div className="text-sm text-blue-800 dark:text-blue-300">
                <strong>Nota:</strong> Alterar o consumo médio afetará a estimativa de gasto (R$) dos próximos destinos que você adicionar. Destinos já salvos mantêm o valor calculado na época.
              </div>
            </div>
          </div>
        );
      };

      const WeatherWidget = ({ lat, lng }) => {
        const [weather, setWeather] = useState(null);
        useEffect(() => {
          if (lat && lng) fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current_weather=true`).then(res => res.json()).then(data => setWeather(data.current_weather)).catch(()=>{});
        }, [lat, lng]);

        if (!weather) return null;
        const isRainy = [51, 53, 55, 61, 63, 65, 80, 81, 82].includes(weather.weathercode);
        const isCloudy = [1, 2, 3, 45, 48].includes(weather.weathercode);
        return (
          <div className="flex items-center gap-1.5 text-xs bg-slate-100 dark:bg-neutral-900 px-2 py-1 rounded-md border border-slate-200 dark:border-neutral-700 text-slate-600 dark:text-neutral-300 font-medium">
            {isRainy ? <CloudRain className="w-3.5 h-3.5 text-blue-500" /> : isCloudy ? <CloudSun className="w-3.5 h-3.5 text-slate-400 dark:text-neutral-400" /> : <Sun className="w-3.5 h-3.5 text-amber-500" />}
            {weather.temperature}°C
          </div>
        );
      };

      const PlacesList = () => {
        const [filter, setFilter] = useState('all');
        const filteredPlaces = places.filter(p => filter === 'all' || p.status === filter);

        const formatDate = (dateString) => {
          if (!dateString) return '';
          const [y, m, d] = dateString.split('-');
          return `${d}/${m}/${y}`;
        };

        return (
          <div className="space-y-6 pb-24 md:pb-0 animate-fade-in relative min-h-full">
            <div className="flex justify-between items-center">
              <h2 className="text-2xl font-bold text-slate-800 dark:text-neutral-100">Destinos</h2>
              <div className="bg-slate-100 dark:bg-neutral-800 rounded-lg p-1 flex">
                {['all', 'planned', 'visited'].map(f => (
                  <button key={f} onClick={() => setFilter(f)} className={`px-3 py-1.5 text-xs font-medium rounded-md transition-colors ${filter === f ? 'bg-white dark:bg-neutral-600 text-slate-800 dark:text-white shadow-sm' : 'text-slate-500 dark:text-neutral-400'}`}>
                    {f === 'all' ? 'Todos' : f === 'planned' ? 'Quero Ir' : 'Já Fui'}
                  </button>
                ))}
              </div>
            </div>

            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 pb-16">
              {filteredPlaces.map(place => (
                <div key={place.id} className="bg-white dark:bg-neutral-800 border border-slate-200 dark:border-neutral-700/60 rounded-2xl p-5 flex flex-col justify-between shadow-sm dark:shadow-none transition-colors">
                  <div>
                    <div className="flex justify-between items-start mb-3">
                      <div>
                        <h3 className="text-lg font-bold text-slate-800 dark:text-neutral-200 flex items-center gap-2">
                          {place.name} {place.status === 'planned' && place.lat && <WeatherWidget lat={place.lat} lng={place.lng} />}
                        </h3>
                        <span className="text-slate-500 dark:text-neutral-400 font-medium text-sm">{place.city || place.name} - {place.state}</span>
                      </div>
                      <div className="flex gap-1">
                        {place.status === 'planned' && <button onClick={() => shareTrip(place)} className="text-slate-400 hover:text-amber-500 p-2"><Share2 className="w-5 h-5" /></button>}
                        <button onClick={() => deletePlace(place.id)} className="text-slate-400 hover:text-red-500 p-2"><Trash2 className="w-5 h-5" /></button>
                      </div>
                    </div>
                    
                    {/* Tags da Viagem */}
                    <div className="flex flex-wrap gap-2 mb-4">
                      {place.type && (
                        <span className="flex items-center gap-1 text-xs font-bold text-slate-600 dark:text-neutral-300 bg-slate-100 dark:bg-neutral-700/50 px-2.5 py-1 rounded-md">
                          <TwoWheeler className="w-3.5 h-3.5 text-amber-500" /> {place.type}
                        </span>
                      )}
                      {place.plannedDate && place.status === 'planned' && (
                        <span className="flex items-center gap-1 text-xs font-bold text-slate-600 dark:text-neutral-300 bg-slate-100 dark:bg-neutral-700/50 px-2.5 py-1 rounded-md">
                          <Calendar className="w-3.5 h-3.5 text-blue-500" /> {formatDate(place.plannedDate)}
                        </span>
                      )}
                      {place.hasPassenger && (
                        <span className="flex items-center gap-1 text-xs font-bold text-slate-600 dark:text-neutral-300 bg-slate-100 dark:bg-neutral-700/50 px-2.5 py-1 rounded-md">
                          <Group className="w-3.5 h-3.5 text-green-500" /> Garupa
                        </span>
                      )}
                    </div>

                    {place.distance > 0 && (
                      <div className="flex flex-wrap gap-4 mb-4 bg-slate-50 dark:bg-neutral-900/50 p-3.5 rounded-xl border border-slate-100 dark:border-neutral-800/80">
                        <div className="flex items-center gap-1.5 text-sm text-slate-600 dark:text-neutral-300 font-medium"><Route className="w-4 h-4 text-slate-400 dark:text-neutral-500" />{place.distance} km</div>
                        <div className="flex items-center gap-1.5 text-sm text-slate-600 dark:text-neutral-300 font-medium"><Clock className="w-4 h-4 text-slate-400 dark:text-neutral-500" />{place.duration}</div>
                        <div className="flex items-center gap-1.5 text-sm text-amber-600 dark:text-amber-400 font-semibold">
                          <Fuel className="w-4 h-4 text-amber-500" /> R$ {place.fuelCost?.toFixed(2)}
                        </div>
                        {place.actualCost > 0 && (
                           <div className="flex items-center gap-1.5 text-sm text-green-600 dark:text-green-400 font-semibold w-full mt-2 pt-2 border-t border-slate-200 dark:border-neutral-800">
                            <Wallet className="w-4 h-4 text-green-500" /> Real: R$ {place.actualCost.toFixed(2)}
                          </div>
                        )}
                      </div>
                    )}

                    {place.distance > SAFE_RANGE && place.status === 'planned' && (
                      <div className="mb-4 bg-amber-50 dark:bg-amber-900/20 border border-amber-200 dark:border-amber-900/50 text-amber-700 dark:text-amber-400 p-3 rounded-xl text-xs font-medium flex items-start gap-2">
                        <AlertCircle className="w-4 h-4 flex-shrink-0" /> Excede autonomia da {myMoto.model} ({SAFE_RANGE}km). Planeje paradas!
                      </div>
                    )}
                    {place.notes && <p className="text-sm text-slate-600 dark:text-neutral-400 mb-4 line-clamp-2">{place.notes}</p>}
                  </div>

                  {place.status === 'planned' && (
                    <button onClick={() => setFinishTripModal({ isOpen: true, placeId: place.id, costs: { gas: place.fuelCost?.toFixed(2) || '', food: '', lodging: '', maintenance: '', others: '' } })} className="w-full mt-4 flex items-center justify-center gap-2 bg-slate-100 dark:bg-neutral-700 hover:bg-green-50 dark:hover:bg-green-600/20 text-slate-700 dark:text-white hover:text-green-600 dark:hover:text-green-400 py-2.5 rounded-xl text-sm font-bold transition-all border border-slate-200 dark:border-transparent hover:border-green-200 dark:hover:border-transparent">
                      <CheckCircle2 className="w-5 h-5" /> Marcar Concluído
                    </button>
                  )}
                </div>
              ))}
            </div>

            <button onClick={() => setIsAddModalOpen(true)} className="fixed bottom-24 right-6 md:bottom-10 md:right-10 bg-amber-500 text-white p-4 rounded-full shadow-lg shadow-amber-500/30 hover:bg-amber-600 transition-transform hover:scale-105 z-10 flex items-center justify-center">
              <PlusCircle className="w-6 h-6" />
            </button>
          </div>
        );
      };

      const MapView = () => {
        const mapRef = useRef(null);
        const mapContainer = useRef(null);
        const tileLayerRef = useRef(null);

        useEffect(() => {
          const initMap = () => {
            if (window.L && mapContainer.current) {
              if (!mapRef.current) {
                mapRef.current = window.L.map(mapContainer.current).setView([ORIGIN_LAT, ORIGIN_LNG], 6);
              }

              if (tileLayerRef.current) tileLayerRef.current.remove();
              
              const tileUrl = isDark ? 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png' : 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png';
              tileLayerRef.current = window.L.tileLayer(tileUrl).addTo(mapRef.current);

              mapRef.current.eachLayer((layer) => { if (layer instanceof window.L.Marker) mapRef.current.removeLayer(layer); });

              const IconVisited = window.L.icon({ iconUrl: encodeSvg(svgPinVisited), iconSize: [32, 32], iconAnchor: [16, 32], popupAnchor: [0, -32] });
              const IconPlanned = window.L.icon({ iconUrl: encodeSvg(svgPinPlanned), iconSize: [32, 32], iconAnchor: [16, 32], popupAnchor: [0, -32] });

              const bounds = [];
              places.forEach(place => {
                if (place.lat && place.lng) {
                  const marker = window.L.marker([place.lat, place.lng], { icon: place.status === 'visited' ? IconVisited : IconPlanned }).addTo(mapRef.current);
                  marker.bindPopup(`<div style="padding:2px;"><strong style="color:#1e293b;font-family:sans-serif;">${place.name}</strong><br/><span style="font-size:12px;color:#64748b;">${place.city || place.name}</span></div>`);
                  bounds.push([place.lat, place.lng]);
                }
              });
              if (bounds.length > 0) mapRef.current.fitBounds(bounds, { padding: [50, 50], maxZoom: 12 });
            }
          };

          const checkLeaflet = setInterval(() => { if (window.L) { clearInterval(checkLeaflet); initMap(); } }, 100);
          return () => clearInterval(checkLeaflet);
        }, [places, currentView, isDark]);

        return (
          <div className="h-[calc(100vh-140px)] md:h-full w-full rounded-2xl overflow-hidden border border-slate-200 dark:border-neutral-800 relative z-0 shadow-sm dark:shadow-none">
            <div ref={mapContainer} className="w-full h-full"></div>
          </div>
        );
      };

      const DonutChart = ({ data, total }) => {
        let cumulativePercent = 0;
        const getCoordinatesForPercent = (percent) => {
          const x = Math.cos(2 * Math.PI * percent);
          const y = Math.sin(2 * Math.PI * percent);
          return [x, y];
        };

        if (total === 0) return (
          <div className="w-full h-full rounded-full border-4 border-slate-200 dark:border-neutral-700 flex items-center justify-center">
            <span className="text-xs text-slate-400">R$ 0</span>
          </div>
        );

        return (
          <div className="relative w-full h-full">
            <svg viewBox="-1.4 -1.4 2.8 2.8" className="w-full h-full transform -rotate-90 drop-shadow-sm">
              {data.map(slice => {
                const percent = slice.value / total;
                if (percent === 0) return null;
                if (percent === 1) {
                  return <circle key={slice.label} cx="0" cy="0" r="1" fill="transparent" stroke={slice.color} strokeWidth="0.45" />
                }
                const startCoords = getCoordinatesForPercent(cumulativePercent);
                cumulativePercent += percent;
                const endCoords = getCoordinatesForPercent(cumulativePercent);
                const largeArcFlag = percent > 0.5 ? 1 : 0;
                const pathData = [
                  `M ${startCoords[0]} ${startCoords[1]}`,
                  `A 1 1 0 ${largeArcFlag} 1 ${endCoords[0]} ${endCoords[1]}`
                ].join(' ');
                
                return <path key={slice.label} d={pathData} fill="none" stroke={slice.color} strokeWidth="0.45" className="transition-all duration-500 ease-in-out hover:opacity-80" />;
              })}
            </svg>
            <div className="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
              <span className="text-[10px] text-slate-400 dark:text-neutral-500 font-bold uppercase tracking-widest mb-0.5">Total</span>
              <span className="text-sm font-black text-slate-800 dark:text-neutral-200">R$ {total.toFixed(0)}</span>
            </div>
          </div>
        );
      };

      const FinanceView = () => {
        const visited = places.filter(p => p.status === 'visited' || (p.actualCost > 0));
        const estimated = visited.reduce((acc, curr) => acc + (curr.fuelCost || 0), 0);
        const totalGeneral = generalExpenses.reduce((acc, curr) => acc + curr.amount, 0);
        const actual = visited.reduce((acc, curr) => acc + (curr.actualCost || 0), 0) + totalGeneral;
        const diff = actual - estimated;

        const TripFinanceRow = ({ t }) => {
          const [expanded, setExpanded] = useState(false);
          const gas = t.costDetails?.gas || t.actualCost || 0;
          const food = t.costDetails?.food || 0;
          const lodging = t.costDetails?.lodging || 0;
          const maintenance = t.costDetails?.maintenance || 0;
          const others = t.costDetails?.others || 0;
          const totalCost = gas + food + lodging + maintenance + others;

          const chartData = [
            { id: 'gas', label: 'Gasolina', value: gas, color: '#f59e0b', icon: Fuel, iconColor: 'text-amber-500', bgIcon: 'bg-amber-100 dark:bg-amber-500/20' },
            { id: 'food', label: 'Alimentação', value: food, color: '#f97316', icon: Restaurant, iconColor: 'text-orange-500', bgIcon: 'bg-orange-100 dark:bg-orange-500/20' },
            { id: 'lodging', label: 'Hospedagem', value: lodging, color: '#3b82f6', icon: Hotel, iconColor: 'text-blue-500', bgIcon: 'bg-blue-100 dark:bg-blue-500/20' },
            { id: 'maintenance', label: 'Manutenção', value: maintenance, color: '#ef4444', icon: Build, iconColor: 'text-red-500', bgIcon: 'bg-red-100 dark:bg-red-500/20' },
            { id: 'others', label: 'Outros', value: others, color: '#a855f7', icon: Category, iconColor: 'text-purple-500', bgIcon: 'bg-purple-100 dark:bg-purple-500/20' }
          ].filter(item => item.value > 0);

          return (
            <div className="border-b border-slate-100 dark:border-neutral-700/50 last:border-0 overflow-hidden">
              <div onClick={() => setExpanded(!expanded)} className="p-4 flex justify-between items-center bg-white dark:bg-neutral-800 hover:bg-slate-50 dark:hover:bg-neutral-700/30 transition-colors cursor-pointer select-none">
                <div>
                  <div className="font-bold text-slate-800 dark:text-neutral-200 flex items-center gap-2">
                    {t.name}
                  </div>
                  <div className="text-xs text-slate-500">{new Date(t.date || t.plannedDate).toLocaleDateString('pt-BR')}</div>
                </div>
                <div className="flex items-center gap-3">
                  <div className="text-right">
                    <div className="text-green-600 dark:text-green-400 font-bold text-lg">R$ {t.actualCost?.toFixed(2) || '0.00'}</div>
                  </div>
                  <ExpandMore className={`w-5 h-5 text-slate-400 transition-transform duration-300 ${expanded ? 'rotate-180' : ''}`} />
                </div>
              </div>
              
              {expanded && (
                <div className="bg-slate-50 dark:bg-neutral-900/50 border-t border-slate-100 dark:border-neutral-800 animate-fade-in">
                  <div className="p-6 flex flex-col md:flex-row items-center gap-8">
                    
                    <div className="w-40 h-40 flex-shrink-0">
                      <DonutChart data={chartData} total={totalCost} />
                    </div>

                    <div className="flex-1 w-full space-y-3">
                      {chartData.length === 0 ? (
                        <div className="text-sm text-slate-500 text-center md:text-left">Sem gastos registrados.</div>
                      ) : (
                        chartData.map(item => {
                          const percentage = totalCost > 0 ? ((item.value / totalCost) * 100).toFixed(1) : 0;
                          return (
                            <div key={item.id} className="flex items-center justify-between p-3 bg-white dark:bg-neutral-800 rounded-xl border border-slate-100 dark:border-neutral-700 shadow-sm dark:shadow-none transition-colors hover:border-slate-300 dark:hover:border-neutral-600">
                              <div className="flex items-center gap-3">
                                <div className={`w-8 h-8 rounded-lg flex items-center justify-center ${item.bgIcon}`}>
                                  <item.icon className={`w-4 h-4 ${item.iconColor}`} />
                                </div>
                                <div>
                                  <div className="font-bold text-slate-700 dark:text-neutral-200 text-sm">{item.label}</div>
                                  <div className="text-xs text-slate-400 font-medium">{percentage}% do orçamento</div>
                                </div>
                              </div>
                              <div className="text-right">
                                <div className="font-black text-slate-800 dark:text-neutral-100">R$ {item.value.toFixed(2)}</div>
                              </div>
                            </div>
                          );
                        })
                      )}
                      
                      <div className="text-right text-xs text-slate-400 dark:text-neutral-500 mt-2 pt-2 border-t border-slate-200 dark:border-neutral-700/50">
                        *Estimativa de combustível original: R$ {t.fuelCost?.toFixed(2) || '0.00'}
                      </div>
                    </div>
                    
                  </div>
                </div>
              )}
            </div>
          );
        };

        return (
          <div className="space-y-6 animate-fade-in pb-24 md:pb-0 min-h-full">
            <header className="mb-6 flex justify-between items-center">
              <h2 className="text-2xl font-bold text-slate-800 dark:text-neutral-100 flex items-center gap-2">
                <Wallet className="text-green-500 w-7 h-7" /> Gestão Financeira
              </h2>
              <button onClick={() => setExpenseModal(true)} className="bg-amber-500 hover:bg-amber-600 text-white px-4 py-2 rounded-xl text-sm font-bold flex items-center gap-2 transition-colors">
                <PlusCircle className="w-5 h-5" /> <span className="hidden md:inline">Despesa</span>
              </button>
            </header>
            <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
              <FinanceCard icon={Fuel} color="amber" label="Previsão (Gasolina)" value={estimated} />
              <FinanceCard icon={Receipt} color="green" label="Gasto Real Total" value={actual} />
              <FinanceCard icon={TrendingUp} color={diff > 0 ? "red" : "blue"} label="Diferença (Extras)" value={Math.abs(diff)} subtext={diff > 0 ? 'A mais' : 'Economia'} />
            </div>
            
            <div className="bg-white dark:bg-neutral-800 border border-slate-200 dark:border-neutral-700 rounded-2xl overflow-hidden shadow-sm dark:shadow-none mt-8">
              <div className="p-4 border-b border-slate-100 dark:border-neutral-700/50 bg-slate-50 dark:bg-neutral-800/50 font-bold text-slate-700 dark:text-neutral-300 flex items-center gap-2">
                <PieChart className="w-4 h-4" /> Histórico por Viagem
              </div>
              <div className="flex flex-col">
                {visited.length === 0 ? (
                  <div className="p-6 text-center text-slate-500 dark:text-neutral-500">Nenhuma viagem concluída.</div> 
                ) : (
                  visited.map(t => <TripFinanceRow key={t.id} t={t} />)
                )}
              </div>
            </div>

            <div className="bg-white dark:bg-neutral-800 border border-slate-200 dark:border-neutral-700 rounded-2xl overflow-hidden shadow-sm dark:shadow-none mt-6">
              <div className="p-4 border-b border-slate-100 dark:border-neutral-700/50 bg-slate-50 dark:bg-neutral-800/50 font-bold text-slate-700 dark:text-neutral-300 flex items-center gap-2">
                <Build className="w-4 h-4 text-red-500" /> Despesas Avulsas da Moto
              </div>
              <div className="flex flex-col divide-y divide-slate-100 dark:divide-neutral-700/50">
                {generalExpenses.length === 0 ? (
                  <div className="p-6 text-center text-slate-500 dark:text-neutral-500">Nenhuma despesa avulsa.</div> 
                ) : (
                  generalExpenses.map(e => (
                    <div key={e.id} className="p-4 flex justify-between items-center bg-white dark:bg-neutral-800 hover:bg-slate-50 dark:hover:bg-neutral-700/30 transition-colors">
                      <div>
                        <div className="font-bold text-slate-800 dark:text-neutral-200">{e.description || 'Despesa Geral'}</div>
                        <div className="text-xs text-slate-500 flex items-center gap-2 mt-0.5">
                          <span>{new Date(e.date).toLocaleDateString('pt-BR')}</span>
                          <span className="bg-slate-100 dark:bg-neutral-700 px-1.5 py-0.5 rounded text-[10px] uppercase font-bold">{e.category === 'maintenance' ? 'Manutenção' : e.category === 'gas' ? 'Gasolina' : e.category === 'food' ? 'Alimentação' : e.category === 'lodging' ? 'Hospedagem' : e.category}</span>
                        </div>
                      </div>
                      <div className="flex items-center gap-3">
                        <div className="text-right">
                          <div className="text-slate-800 dark:text-neutral-200 font-bold">R$ {e.amount.toFixed(2)}</div>
                        </div>
                        <button onClick={() => deleteGeneralExpense(e.id)} className="text-slate-400 hover:text-red-500 p-1"><Trash2 className="w-5 h-5" /></button>
                      </div>
                    </div>
                  ))
                )}
              </div>
            </div>

          </div>
        );
      };

      const ChecklistView = () => {
        const defaultChecklist = [
          { id: 1, text: `Calibrar pneus da ${myMoto.model}`, done: false },
          { id: 2, text: "Checar nível do óleo", done: false },
          { id: 3, text: "Limpar e lubrificar a corrente", done: false },
          { id: 4, text: "Documento da moto e CNH", done: false },
          { id: 5, text: "Capa de chuva e kit reparo pneu", done: false },
        ];
        const [items, setItems] = useState(() => { const s = localStorage.getItem('motoChecklist'); return s ? JSON.parse(s) : defaultChecklist; });
        useEffect(() => { localStorage.setItem('motoChecklist', JSON.stringify(items)); }, [items]);

        return (
          <div className="animate-fade-in max-w-xl pb-24 md:pb-0">
            <h2 className="text-2xl font-bold text-slate-800 dark:text-neutral-100 mb-6">Checklist {myMoto.model}</h2>
            <div className="bg-white dark:bg-neutral-800 border border-slate-200 dark:border-neutral-700 rounded-2xl overflow-hidden shadow-sm dark:shadow-none">
              {items.map((item) => (
                <div key={item.id} onClick={() => setItems(items.map(i => i.id === item.id ? { ...i, done: !i.done } : i))} className={`flex items-center gap-4 p-4 cursor-pointer transition-colors border-b border-slate-100 dark:border-neutral-700/50 hover:bg-slate-50 dark:hover:bg-neutral-700/30 ${item.done ? 'opacity-50' : ''}`}>
                  <div className={`w-5 h-5 rounded flex items-center justify-center border-2 flex-shrink-0 transition-colors ${item.done ? 'bg-amber-500 border-amber-500' : 'border-slate-300 dark:border-neutral-500'}`}>{item.done && <CheckSquare className="w-4 h-4 text-white dark:text-neutral-900" />}</div>
                  <span className={`text-sm font-medium ${item.done ? 'line-through text-slate-400 dark:text-neutral-500' : 'text-slate-700 dark:text-neutral-200'}`}>{item.text}</span>
                </div>
              ))}
            </div>
            <button onClick={() => setItems(defaultChecklist)} className="mt-6 text-sm text-slate-500 hover:text-amber-500 font-medium underline">Resetar Checklist</button>
          </div>
        );
      };

      return (
        <div className={`h-screen w-full overflow-hidden transition-colors duration-300 ${isDark ? 'dark bg-neutral-950 text-neutral-200' : 'bg-slate-50 text-slate-800'} font-sans`}>
          <div className="w-full h-full flex">
            
            <aside className="hidden md:flex flex-col w-64 h-full bg-white dark:bg-neutral-900 border-r border-slate-200 dark:border-neutral-800 p-6 transition-colors duration-300 overflow-y-auto flex-shrink-0">
              <div className="flex items-center justify-between mb-10">
                <div className="flex items-center gap-2 text-amber-500 font-black text-xl"><Navigation className="w-6 h-6" /> MotoTracker</div>
              </div>
              <nav className="flex flex-col gap-1.5 flex-1">
                <NavBtn icon={Home} label="Dashboard" view="dashboard" current={currentView} set={setCurrentView} />
                <NavBtn icon={MapIcon} label="Mapa" view="map" current={currentView} set={setCurrentView} />
                <NavBtn icon={List} label="Viagens" view="list" current={currentView} set={setCurrentView} />
                <NavBtn icon={Wallet} label="Financeiro" view="finance" current={currentView} set={setCurrentView} />
                <NavBtn icon={CheckSquare} label="Checklist" view="checklist" current={currentView} set={setCurrentView} />
                
                <div className="mt-6 pt-6 border-t border-slate-100 dark:border-neutral-800">
                  <NavBtn icon={Settings} label="Configurações" view="settings" current={currentView} set={setCurrentView} />
                </div>
              </nav>
              
              <div className="mt-auto pt-6 border-t border-slate-200 dark:border-neutral-800 flex items-center justify-between">
                <span className="text-xs font-semibold text-slate-400 dark:text-neutral-500 uppercase tracking-wider">Tema</span>
                <ThemeToggle isDark={isDark} toggle={toggleTheme} />
              </div>
            </aside>

            <main className="flex-1 h-full overflow-y-auto p-5 md:p-10 relative pb-24 md:pb-10">
              <div className="md:hidden flex justify-between items-center mb-6">
                <div className="flex items-center gap-2 text-amber-500 font-black text-xl"><Navigation className="w-6 h-6" /> MotoTracker</div>
                <ThemeToggle isDark={isDark} toggle={toggleTheme} />
              </div>

              {currentView === 'dashboard' && <Dashboard />}
              {currentView === 'map' && <MapView />}
              {currentView === 'list' && <PlacesList />}
              {currentView === 'finance' && <FinanceView />}
              {currentView === 'checklist' && <ChecklistView />}
              {currentView === 'settings' && <SettingsView />}
            </main>
          </div>

          <nav className="md:hidden fixed bottom-0 left-0 right-0 bg-white dark:bg-neutral-900 border-t border-slate-200 dark:border-neutral-800 flex justify-between items-center px-1 py-1 pb-safe z-40 transition-colors duration-300 overflow-x-auto">
            <MobileBtn icon={Home} label="Início" view="dashboard" current={currentView} set={setCurrentView} />
            <MobileBtn icon={MapIcon} label="Mapa" view="map" current={currentView} set={setCurrentView} />
            <MobileBtn icon={List} label="Viagens" view="list" current={currentView} set={setCurrentView} />
            <MobileBtn icon={CheckSquare} label="Checklist" view="checklist" current={currentView} set={setCurrentView} />
            <MobileBtn icon={Settings} label="Config." view="settings" current={currentView} set={setCurrentView} />
          </nav>

          {isAddModalOpen && (
            <div className="fixed inset-0 bg-slate-900/40 dark:bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-4 animate-fade-in">
              <div className="bg-white dark:bg-neutral-900 border border-slate-200 dark:border-neutral-800 w-full max-w-md rounded-2xl overflow-hidden shadow-2xl">
                <div className="flex justify-between items-center p-5 border-b border-slate-100 dark:border-neutral-800">
                  <h2 className="text-xl font-bold text-slate-800 dark:text-white">Novo Destino</h2>
                  <button onClick={() => setIsAddModalOpen(false)} className="text-slate-400 hover:text-slate-600 dark:hover:text-white"><X className="w-6 h-6" /></button>
                </div>
                <form onSubmit={(e) => {
                  e.preventDefault(); const fd = new FormData(e.target);
                  addPlace({ 
                    name: fd.get('name'), 
                    city: fd.get('city'), 
                    state: fd.get('state').toUpperCase(), 
                    type: fd.get('type'),
                    plannedDate: fd.get('plannedDate'),
                    hasPassenger: fd.get('hasPassenger') === 'on',
                    status: 'planned', 
                    notes: fd.get('notes') 
                  }, parseFloat(fd.get('customFuel')) || fuelPrice);
                }} className="p-5 space-y-4">
                  
                  <Input label="Nome da Viagem" name="name" placeholder="Ex: Feriado na Serra" />
                  
                  <div className="grid grid-cols-2 gap-4">
                    <Input label="Cidade Destino" name="city" placeholder="Ex: Guaramiranga" />
                    <Input label="Estado (UF)" name="state" placeholder="CE" maxLength="2" isUppercase />
                  </div>
                  
                  <div className="grid grid-cols-2 gap-4">
                    <div>
                      <label className="block text-xs font-semibold text-slate-500 dark:text-neutral-400 mb-1">Tipo de Viagem</label>
                      <select name="type" className="w-full bg-slate-50 dark:bg-neutral-800 border border-slate-200 dark:border-neutral-700 rounded-xl p-3 text-slate-800 dark:text-white focus:border-amber-500 outline-none transition-colors">
                        <option value="Bate e Volta">Bate e Volta</option>
                        <option value="Viagem Curta">Viagem Curta</option>
                        <option value="Viagem Longa">Viagem Longa</option>
                        <option value="Expedição">Expedição</option>
                      </select>
                    </div>
                    <Input label="Data Prevista" name="plannedDate" type="date" />
                  </div>

                  <div className="grid grid-cols-2 gap-4 items-center">
                    <Input label="Preço Gasolina (R$)" name="customFuel" type="number" step="0.01" defaultValue={fuelPrice} />
                    <label className="flex items-center gap-2 cursor-pointer mt-5 bg-slate-50 dark:bg-neutral-800 border border-slate-200 dark:border-neutral-700 rounded-xl p-3 hover:border-amber-500 transition-colors">
                      <input type="checkbox" name="hasPassenger" className="w-5 h-5 accent-amber-500 cursor-pointer" />
                      <span className="text-sm font-semibold text-slate-700 dark:text-neutral-300">Leva Garupa?</span>
                    </label>
                  </div>

                  <div>
                    <label className="block text-xs font-semibold text-slate-500 dark:text-neutral-400 mb-1">Anotações (Opcional)</label>
                    <textarea name="notes" rows="2" className="w-full bg-slate-50 dark:bg-neutral-800 border border-slate-200 dark:border-neutral-700 rounded-xl p-3 text-slate-800 dark:text-white focus:border-amber-500 outline-none resize-none transition-colors"></textarea>
                  </div>
                  <button type="submit" className="w-full bg-amber-500 hover:bg-amber-600 text-white font-bold py-3.5 rounded-xl transition-colors">Salvar no DB</button>
                </form>
              </div>
            </div>
          )}

          {finishTripModal.isOpen && (
            <div className="fixed inset-0 bg-slate-900/40 dark:bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-4 animate-fade-in">
              <div className="bg-white dark:bg-neutral-900 border border-slate-200 dark:border-neutral-800 w-full max-w-sm rounded-2xl overflow-hidden shadow-2xl p-6">
                <h2 className="text-xl font-bold text-slate-800 dark:text-white mb-2">Finalizar Viagem</h2>
                <p className="text-sm text-slate-500 dark:text-neutral-400 mb-5">Detalhe os gastos da viagem.</p>
                <form onSubmit={confirmFinishTrip} className="space-y-4">
                  
                  <div className="grid grid-cols-2 gap-4">
                    <div>
                      <label className="block text-xs font-semibold text-slate-500 dark:text-neutral-400 mb-1">Gasolina</label>
                      <div className="relative">
                        <span className="absolute left-3 top-2.5 text-slate-400 text-sm font-bold">R$</span>
                        <input type="number" step="0.01" value={finishTripModal.costs.gas} onChange={(e) => setFinishTripModal({...finishTripModal, costs: {...finishTripModal.costs, gas: e.target.value}})} className="w-full bg-slate-50 dark:bg-neutral-800 border border-slate-200 dark:border-neutral-700 rounded-xl p-2.5 pl-9 text-slate-800 dark:text-white focus:border-amber-500 outline-none font-bold" />
                      </div>
                    </div>
                    <div>
                      <label className="block text-xs font-semibold text-slate-500 dark:text-neutral-400 mb-1">Alimentação</label>
                      <div className="relative">
                        <span className="absolute left-3 top-2.5 text-slate-400 text-sm font-bold">R$</span>
                        <input type="number" step="0.01" value={finishTripModal.costs.food} onChange={(e) => setFinishTripModal({...finishTripModal, costs: {...finishTripModal.costs, food: e.target.value}})} className="w-full bg-slate-50 dark:bg-neutral-800 border border-slate-200 dark:border-neutral-700 rounded-xl p-2.5 pl-9 text-slate-800 dark:text-white focus:border-amber-500 outline-none font-bold" />
                      </div>
                    </div>
                    <div>
                      <label className="block text-xs font-semibold text-slate-500 dark:text-neutral-400 mb-1">Hospedagem</label>
                      <div className="relative">
                        <span className="absolute left-3 top-2.5 text-slate-400 text-sm font-bold">R$</span>
                        <input type="number" step="0.01" value={finishTripModal.costs.lodging} onChange={(e) => setFinishTripModal({...finishTripModal, costs: {...finishTripModal.costs, lodging: e.target.value}})} className="w-full bg-slate-50 dark:bg-neutral-800 border border-slate-200 dark:border-neutral-700 rounded-xl p-2.5 pl-9 text-slate-800 dark:text-white focus:border-amber-500 outline-none font-bold" />
                      </div>
                    </div>
                    <div>
                      <label className="block text-xs font-semibold text-slate-500 dark:text-neutral-400 mb-1">Manutenção</label>
                      <div className="relative">
                        <span className="absolute left-3 top-2.5 text-slate-400 text-sm font-bold">R$</span>
                        <input type="number" step="0.01" value={finishTripModal.costs.maintenance} onChange={(e) => setFinishTripModal({...finishTripModal, costs: {...finishTripModal.costs, maintenance: e.target.value}})} className="w-full bg-slate-50 dark:bg-neutral-800 border border-slate-200 dark:border-neutral-700 rounded-xl p-2.5 pl-9 text-slate-800 dark:text-white focus:border-amber-500 outline-none font-bold" />
                      </div>
                    </div>
                    <div>
                      <label className="block text-xs font-semibold text-slate-500 dark:text-neutral-400 mb-1">Outros</label>
                      <div className="relative">
                        <span className="absolute left-3 top-2.5 text-slate-400 text-sm font-bold">R$</span>
                        <input type="number" step="0.01" value={finishTripModal.costs.others} onChange={(e) => setFinishTripModal({...finishTripModal, costs: {...finishTripModal.costs, others: e.target.value}})} className="w-full bg-slate-50 dark:bg-neutral-800 border border-slate-200 dark:border-neutral-700 rounded-xl p-2.5 pl-9 text-slate-800 dark:text-white focus:border-amber-500 outline-none font-bold" />
                      </div>
                    </div>
                  </div>

                  <div className="flex justify-between items-center bg-slate-50 dark:bg-neutral-800/50 p-3 rounded-xl border border-slate-100 dark:border-neutral-800 mt-2">
                    <span className="text-sm font-bold text-slate-600 dark:text-neutral-300">Total:</span>
                    <span className="text-lg font-black text-green-600 dark:text-green-400">
                      R$ {((parseFloat(finishTripModal.costs.gas)||0) + (parseFloat(finishTripModal.costs.food)||0) + (parseFloat(finishTripModal.costs.lodging)||0) + (parseFloat(finishTripModal.costs.maintenance)||0) + (parseFloat(finishTripModal.costs.others)||0)).toFixed(2)}
                    </span>
                  </div>

                  <div className="flex gap-3 mt-4">
                    <button type="button" onClick={() => setFinishTripModal({isOpen: false, placeId: null, costs: { gas: '', food: '', lodging: '', maintenance: '', others: '' }})} className="flex-1 bg-slate-100 dark:bg-neutral-800 text-slate-600 dark:text-neutral-300 font-bold py-3 rounded-xl hover:bg-slate-200 dark:hover:bg-neutral-700 transition-colors">Cancelar</button>
                    <button type="submit" className="flex-1 bg-green-500 text-white font-bold py-3 rounded-xl hover:bg-green-600 transition-colors">Salvar no DB</button>
                  </div>
                </form>
              </div>
            </div>
          )}

          {expenseModal && (
            <div className="fixed inset-0 bg-slate-900/40 dark:bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-4 animate-fade-in">
              <div className="bg-white dark:bg-neutral-900 border border-slate-200 dark:border-neutral-800 w-full max-w-sm rounded-2xl overflow-hidden shadow-2xl">
                <div className="flex justify-between items-center p-5 border-b border-slate-100 dark:border-neutral-800">
                  <h2 className="text-xl font-bold text-slate-800 dark:text-white">Lançar Despesa</h2>
                  <button onClick={() => setExpenseModal(false)} className="text-slate-400 hover:text-slate-600 dark:hover:text-white"><X className="w-6 h-6" /></button>
                </div>
                <form onSubmit={handleAddExpense} className="p-5 space-y-4">
                  <div>
                    <label className="block text-xs font-semibold text-slate-500 dark:text-neutral-400 mb-1">Vincular a (Opcional)</label>
                    <select required name="tripId" className="w-full bg-slate-50 dark:bg-neutral-800 border border-slate-200 dark:border-neutral-700 rounded-xl p-3 text-slate-800 dark:text-white focus:border-amber-500 outline-none">
                      <option value="general">Nenhuma (Despesa Avulsa da Moto)</option>
                      {places.map(p => <option key={p.id} value={p.id}>Viagem: {p.name}</option>)}
                    </select>
                  </div>
                  <div>
                    <label className="block text-xs font-semibold text-slate-500 dark:text-neutral-400 mb-1">Descrição</label>
                    <input name="description" type="text" placeholder="Ex: Remendo no pneu, Troca de óleo" className="w-full bg-slate-50 dark:bg-neutral-800 border border-slate-200 dark:border-neutral-700 rounded-xl p-3 text-slate-800 dark:text-white focus:border-amber-500 outline-none" />
                  </div>
                  <div className="grid grid-cols-2 gap-3">
                    <div>
                      <label className="block text-xs font-semibold text-slate-500 dark:text-neutral-400 mb-1">Categoria</label>
                      <select required name="category" className="w-full bg-slate-50 dark:bg-neutral-800 border border-slate-200 dark:border-neutral-700 rounded-xl p-3 text-slate-800 dark:text-white focus:border-amber-500 outline-none">
                        <option value="maintenance">Manutenção</option>
                        <option value="gas">Gasolina</option>
                        <option value="food">Alimentação</option>
                        <option value="lodging">Hospedagem</option>
                        <option value="others">Outros</option>
                      </select>
                    </div>
                    <div>
                      <label className="block text-xs font-semibold text-slate-500 dark:text-neutral-400 mb-1">Valor (R$)</label>
                      <div className="relative">
                        <span className="absolute left-3 top-2.5 text-slate-400 text-sm font-bold">R$</span>
                        <input required name="amount" type="number" step="0.01" className="w-full bg-slate-50 dark:bg-neutral-800 border border-slate-200 dark:border-neutral-700 rounded-xl p-2.5 pl-9 text-slate-800 dark:text-white focus:border-amber-500 outline-none font-bold" />
                      </div>
                    </div>
                  </div>
                  <button type="submit" className="w-full mt-2 bg-green-500 hover:bg-green-600 text-white font-bold py-3.5 rounded-xl transition-colors">Confirmar Lançamento DB</button>
                </form>
              </div>
            </div>
          )}

          {toastMsg && <div className="fixed top-5 left-1/2 -translate-x-1/2 bg-slate-800 dark:bg-neutral-800 text-white px-6 py-3 rounded-full shadow-lg z-50 animate-fade-in flex items-center gap-2 font-medium"><CheckCircle2 className="w-5 h-5 text-amber-500" />{toastMsg}</div>}
        </div>
      );
    }

    const ThemeToggle = ({ isDark, toggle }) => (
      <button onClick={toggle} className={`relative flex items-center w-14 h-8 rounded-full p-1 transition-colors duration-300 ${isDark ? 'bg-neutral-800 border border-neutral-700' : 'bg-slate-200 border border-slate-300'}`}>
        <div className={`absolute w-6 h-6 rounded-full shadow-sm transform transition-transform duration-300 flex items-center justify-center ${isDark ? 'translate-x-6 bg-neutral-900' : 'translate-x-0 bg-white'}`}>
          {isDark ? <Moon className="w-4 h-4 text-amber-400" /> : <Sun className="w-4 h-4 text-amber-500" />}
        </div>
      </button>
    );

    const StatCard = ({ value, label, icon: Icon, color }) => (
      <div className="bg-white dark:bg-neutral-800/50 border border-slate-200 dark:border-neutral-700/60 p-4 rounded-2xl flex flex-col justify-between shadow-sm dark:shadow-none min-h-[100px]">
        <div className="flex justify-between items-start mb-2">
          <div className={`p-2 rounded-lg bg-slate-50 dark:bg-neutral-900/50 ${color}`}><Icon className="w-6 h-6" /></div>
        </div>
        <div>
          <div className="text-xl md:text-2xl font-black text-slate-800 dark:text-neutral-100">{value}</div>
          <div className="text-[10px] md:text-xs text-slate-500 dark:text-neutral-400 font-bold">{label}</div>
        </div>
      </div>
    );

    const FinanceCard = ({ icon: Icon, color, label, value, subtext }) => {
      const colors = { amber: 'text-amber-500', green: 'text-green-500', blue: 'text-blue-500', red: 'text-red-500' };
      return (
        <div className="bg-white dark:bg-neutral-800/50 border border-slate-200 dark:border-neutral-700 p-5 rounded-2xl shadow-sm dark:shadow-none">
          <div className="flex items-center gap-2 text-slate-500 dark:text-neutral-400 mb-2 font-medium text-sm"><Icon className={`w-5 h-5 ${colors[color]}`} /> {label}</div>
          <div className={`text-2xl font-black ${color==='green'?'text-green-600 dark:text-green-400':color==='red'?'text-red-500':color==='blue'?'text-blue-500':'text-slate-800 dark:text-neutral-200'}`}>
            R$ {value.toFixed(2)} <span className="text-sm font-medium opacity-80">{subtext}</span>
          </div>
        </div>
      );
    };

    const Input = ({ label, name, placeholder, type="text", step, defaultValue, maxLength, isUppercase }) => (
      <div>
        <label className="block text-xs font-semibold text-slate-500 dark:text-neutral-400 mb-1">{label}</label>
        <input required={type !== "date"} name={name} type={type} step={step} defaultValue={defaultValue} maxLength={maxLength} placeholder={placeholder} className={`w-full bg-slate-50 dark:bg-neutral-800 border border-slate-200 dark:border-neutral-700 rounded-xl p-3 text-slate-800 dark:text-white focus:border-amber-500 outline-none transition-colors ${isUppercase ? 'uppercase' : ''}`} />
      </div>
    );

    const NavBtn = ({ icon: Icon, label, view, current, set }) => (
      <button onClick={() => set(view)} className={`flex items-center gap-3 px-4 py-3 rounded-xl font-bold transition-all text-left w-full ${current === view ? 'bg-amber-50 dark:bg-amber-500/10 text-amber-600 dark:text-amber-500' : 'text-slate-500 dark:text-neutral-400 hover:bg-slate-50 dark:hover:bg-neutral-800/50 hover:text-slate-800 dark:hover:text-neutral-200'}`}>
        <Icon className="w-6 h-6" />{label}
      </button>
    );

    const MobileBtn = ({ icon: Icon, label, view, current, set }) => (
      <button onClick={() => set(view)} className={`flex flex-col items-center gap-1 p-2 min-w-[64px] transition-colors ${current === view ? 'text-amber-500' : 'text-slate-400 dark:text-neutral-500'}`}>
        <Icon className={`w-6 h-6 ${current === view ? 'text-amber-500' : ''}`} />
        <span className="text-[10px] font-bold">{label}</span>
      </button>
    );

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
