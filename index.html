<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MotoTracker v08</title>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class', theme: { extend: {} } }</script>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />

  <style>
    .material-symbols-rounded { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; display: inline-flex; align-items: center; justify-content: center; line-height: 1; }
    .material-symbols-rounded.w-5 { font-size: 1.25rem; }
    .material-symbols-rounded.w-6 { font-size: 1.5rem; }
    .material-symbols-rounded.w-8 { font-size: 2rem; }
    .pb-safe { padding-bottom: env(safe-area-inset-bottom, 1rem); }
    .animate-fade-in { animation: fadeIn 0.2s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    ::-webkit-scrollbar { display: none; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-neutral-950 dark:text-neutral-200">
  
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- CONFIGURAÇÃO DO SUPABASE ---
    const supabaseUrl = 'https://ofgafzebcyjmtxdkgqyy.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9mZ2FmemViY3lqbXR4ZGtncXl5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxMjQwODksImV4cCI6MjA5NDcwMDA4OX0.Xt4XfB3NJ2HKqbjaLsbjOY_WyTND-SubwBHkaPZq3eM';
    const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

    // --- MAPA DE ÍCONES ---
    const MIcon = ({ name, className }) => <span className={`material-symbols-rounded ${className || ''}`}>{name}</span>;
    const Home = (p) => <MIcon name="home" {...p} />;
    const List = (p) => <MIcon name="list" {...p} />;
    const PlusCircle = (p) => <MIcon name="add_circle" {...p} />;
    const CheckCircle2 = (p) => <MIcon name="check_circle" {...p} />;
    const Trash2 = (p) => <MIcon name="delete" {...p} />;
    const Navigation = (p) => <MIcon name="near_me" {...p} />;
    const Fuel = (p) => <MIcon name="local_gas_station" {...p} />;
    const Clock = (p) => <MIcon name="schedule" {...p} />;
    const EditIcon = (p) => <MIcon name="edit" {...p} />;
    const X = (p) => <MIcon name="close" {...p} />;
    const Wallet = (p) => <MIcon name="account_balance_wallet" {...p} />;
    const MapPin = (p) => <MIcon name="location_on" {...p} />;
    const Thermometer = (p) => <MIcon name="device_thermostat" {...p} />;
    const Settings = (p) => <MIcon name="settings" {...p} />;
    const Calendar = (p) => <MIcon name="calendar_month" {...p} />;
    const Users = (p) => <MIcon name="group" {...p} />;
    const Route = (p) => <MIcon name="route" {...p} />;
    const CheckSquare = (p) => <MIcon name="check_box" {...p} />;

    const ORIGIN_LAT = -3.7327; // Fortaleza
    const ORIGIN_LNG = -38.5270;

    const motoDatabase = {
      "Yamaha": [ { model: "Fazer 250", consumption: 29 }, { model: "MT-03", consumption: 22 }, { model: "Tenere 250", consumption: 30 } ],
      "Honda": [ { model: "CB 300F Twister", consumption: 35 }, { model: "XRE 300", consumption: 26 }, { model: "CG 160", consumption: 40 } ],
      "Outra": [ { model: "Modelo Personalizado", consumption: 25 } ]
    };

    function App() {
      const [theme, setTheme] = useState(() => localStorage.getItem('motoTrackerTheme') || 'dark');
      const [places, setPlaces] = useState([]);
      const [editingPlace, setEditingPlace] = useState(null);
      const [fuelPrice, setFuelPrice] = useState(() => parseFloat(localStorage.getItem('fuelPrice')) || 5.80);
      const [myMoto, setMyMoto] = useState(() => JSON.parse(localStorage.getItem('myMotoConfig')) || { brand: 'Yamaha', model: 'Fazer 250', consumption: 29 });
      const [currentView, setCurrentView] = useState('dashboard');
      const [toastMsg, setToastMsg] = useState('');
      const [isDbConnected, setIsDbConnected] = useState(false);
      const [isAddModalOpen, setIsAddModalOpen] = useState(false);

      useEffect(() => { fetchTrips(); }, []);
      useEffect(() => { localStorage.setItem('fuelPrice', fuelPrice); }, [fuelPrice]);
      useEffect(() => { localStorage.setItem('myMotoConfig', JSON.stringify(myMoto)); }, [myMoto]);
      useEffect(() => {
        document.documentElement.classList.toggle('dark', theme === 'dark');
        localStorage.setItem('motoTrackerTheme', theme);
      }, [theme]);

      const fetchTrips = async () => {
        const { data, error } = await supabase.from('trips').select('*').order('created_at', { ascending: false });
        if (!error) { setPlaces(data); setIsDbConnected(true); }
      };

      const showToast = (msg) => { setToastMsg(msg); setTimeout(() => setToastMsg(''), 3000); };

      const updatePlace = async (id, updatedData) => {
        try {
          const { error } = await supabase.from('trips').update(updatedData).eq('id', id);
          if (error) throw error;
          setPlaces(places.map(p => p.id === id ? { ...p, ...updatedData } : p));
          setEditingPlace(null);
          showToast("Viagem atualizada!");
        } catch (error) {
          showToast("Erro ao atualizar.");
        }
      };

      const deletePlace = async (id) => {
        if (confirm('Excluir permanentemente?')) {
          const { error } = await supabase.from('trips').delete().eq('id', id);
          if (!error) { setPlaces(places.filter(p => p.id !== id)); showToast("Excluído."); }
        }
      };

      const PlacesList = () => {
        const [filter, setFilter] = useState('all');
        const filtered = places.filter(p => filter === 'all' || p.status === filter);
        const formatDate = (s) => s ? s.split('-').reverse().join('/') : '';

        return (
          <div className="space-y-6 pb-24">
            <div className="flex gap-2 overflow-x-auto pb-2 scrollbar-hide">
              {['all', 'planejada', 'concluida'].map(f => (
                <button key={f} onClick={() => setFilter(f)} className={`px-4 py-2 rounded-full text-sm font-bold whitespace-nowrap transition-all ${filter === f ? 'bg-amber-500 text-white shadow-lg' : 'bg-slate-100 dark:bg-neutral-800 text-slate-500'}`}>
                  {f === 'all' ? 'Todas' : f === 'planejada' ? 'Planejadas' : 'Concluídas'}
                </button>
              ))}
            </div>
            <div className="grid gap-4">
              {filtered.map(place => (
                <div key={place.id} className="bg-white dark:bg-neutral-900 border border-slate-100 dark:border-neutral-800 rounded-3xl p-5 shadow-sm">
                  <div className="flex justify-between items-start mb-4">
                    <div>
                      <h3 className="text-lg font-bold dark:text-white">{place.name}</h3>
                      <p className="text-slate-500 text-sm">{place.city}, {place.state}</p>
                    </div>
                    <div className="flex gap-1">
                      <button onClick={() => setEditingPlace(place)} className="p-2 text-slate-400 hover:text-amber-600 rounded-lg"><EditIcon className="w-5 h-5" /></button>
                      <button onClick={() => deletePlace(place.id)} className="p-2 text-slate-400 hover:text-red-600 rounded-lg"><Trash2 className="w-5 h-5" /></button>
                    </div>
                  </div>
                  <div className="flex justify-between items-center mt-4 pt-4 border-t border-slate-50 dark:border-neutral-800">
                    <div className="flex items-center gap-2 text-slate-400 text-xs font-bold">
                      <Calendar className="w-4 h-4" /> {formatDate(place.planned_date)}
                    </div>
                    <span className={`text-[10px] font-black uppercase px-2 py-1 rounded-md ${place.status === 'concluida' ? 'bg-green-100 text-green-600' : 'bg-amber-100 text-amber-600'}`}>{place.status}</span>
                  </div>
                </div>
              ))}
            </div>
          </div>
        );
      };

      const Dashboard = () => {
        const [temp, setTemp] = useState('--');
        useEffect(() => {
          fetch(`https://api.open-meteo.com/v1/forecast?latitude=${ORIGIN_LAT}&longitude=${ORIGIN_LNG}&current_weather=true`)
            .then(r => r.json()).then(d => setTemp(d.current_weather.temperature));
        }, []);

        return (
          <div className="space-y-6 animate-fade-in pb-24">
            <header className="flex justify-between items-center">
              <h1 className="text-2xl font-black dark:text-white flex items-center gap-2"><Navigation className="text-amber-500" /> MotoTracker</h1>
              <button onClick={() => setTheme(theme === 'dark' ? 'light' : 'dark')} className="p-2 bg-white dark:bg-neutral-800 rounded-xl shadow-sm">
                <MIcon name={theme === 'dark' ? 'light_mode' : 'dark_mode'} className="w-6 h-6 text-amber-500" />
              </button>
            </header>

            <div className="grid grid-cols-2 gap-4">
              <div className="bg-amber-500 p-5 rounded-3xl text-white shadow-xl shadow-amber-500/20">
                <p className="text-xs font-bold opacity-80 uppercase">Viagens</p>
                <p className="text-3xl font-black">{places.length}</p>
              </div>
              <div className="bg-blue-600 p-5 rounded-3xl text-white shadow-xl shadow-blue-600/20">
                <p className="text-xs font-bold opacity-80 uppercase">Clima Base</p>
                <p className="text-3xl font-black">{temp}°C</p>
              </div>
            </div>

            <div className="bg-white dark:bg-neutral-900 border border-slate-100 dark:border-neutral-800 p-6 rounded-3xl shadow-sm">
              <h3 className="font-bold mb-4 flex items-center gap-2"><Fuel className="text-amber-500" /> Minha {myMoto.model}</h3>
              <div className="flex justify-between items-center">
                <span className="text-sm text-slate-500">Consumo Médio</span>
                <span className="font-black text-lg dark:text-white">{myMoto.consumption} km/L</span>
              </div>
            </div>
          </div>
        );
      };

      return (
        <div className="max-w-md mx-auto min-h-screen p-4 md:p-8">
          
          {currentView === 'dashboard' && <Dashboard />}
          {currentView === 'list' && <PlacesList />}
          {currentView === 'settings' && <div className="dark:text-white">Configurações (Em breve)</div>}

          {/* MENU MOBILE */}
          <nav className="fixed bottom-6 left-4 right-4 bg-white/80 dark:bg-neutral-900/80 backdrop-blur-lg border border-slate-200 dark:border-neutral-800 rounded-3xl p-2 flex justify-around items-center shadow-2xl z-50">
            <button onClick={() => setCurrentView('dashboard')} className={`p-3 rounded-2xl ${currentView === 'dashboard' ? 'bg-amber-500 text-white' : 'text-slate-400'}`}><Home className="w-6 h-6" /></button>
            <button onClick={() => setCurrentView('list')} className={`p-3 rounded-2xl ${currentView === 'list' ? 'bg-amber-500 text-white' : 'text-slate-400'}`}><List className="w-6 h-6" /></button>
            <button onClick={() => setCurrentView('settings')} className={`p-3 rounded-2xl ${currentView === 'settings' ? 'bg-amber-500 text-white' : 'text-slate-400'}`}><Settings className="w-6 h-6" /></button>
          </nav>

          {/* TOAST */}
          {toastMsg && <div className="fixed top-6 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-6 py-3 rounded-full text-sm font-bold shadow-2xl z-[100] animate-fade-in">{toastMsg}</div>}

          {/* MODAL DE EDIÇÃO */}
          {editingPlace && (
            <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
              <div className="bg-white dark:bg-neutral-900 rounded-3xl p-6 w-full max-w-md shadow-2xl border border-slate-200 dark:border-neutral-800">
                <div className="flex justify-between items-center mb-6">
                  <h2 className="text-xl font-bold dark:text-white">Editar Viagem</h2>
                  <button onClick={() => setEditingPlace(null)} className="text-slate-400"><X className="w-6 h-6" /></button>
                </div>
                <form onSubmit={(e) => {
                  e.preventDefault();
                  const fd = new FormData(e.target);
                  updatePlace(editingPlace.id, {
                    name: fd.get('name'),
                    city: fd.get('city'),
                    state: fd.get('state').toUpperCase(),
                    notes: fd.get('notes')
                  });
                }} className="space-y-4">
                  <Input label="Destino" name="name" defaultValue={editingPlace.name} />
                  <div className="grid grid-cols-2 gap-4">
                    <Input label="Cidade" name="city" defaultValue={editingPlace.city} />
                    <Input label="UF" name="state" defaultValue={editingPlace.state} maxLength="2" isUppercase />
                  </div>
                  <textarea name="notes" placeholder="Anotações..." defaultValue={editingPlace.notes} className="w-full bg-slate-50 dark:bg-neutral-800 border border-slate-200 dark:border-neutral-700 rounded-xl p-3 dark:text-white h-24 outline-none focus:border-amber-500" />
                  <div className="flex gap-3 pt-4">
                    <button type="button" onClick={() => setEditingPlace(null)} className="flex-1 py-4 bg-slate-100 dark:bg-neutral-800 text-slate-500 rounded-2xl font-bold">Cancelar</button>
                    <button type="submit" className="flex-1 py-4 bg-amber-500 text-white rounded-2xl font-bold shadow-lg shadow-amber-500/20">Salvar</button>
                  </div>
                </form>
              </div>
            </div>
          )}
        </div>
      );
    }

    // --- COMPONENTES AUXILIARES ---
    const Input = ({ label, name, type = "text", defaultValue, maxLength, isUppercase }) => (
      <div>
        <label className="block text-[10px] font-bold text-slate-400 uppercase mb-1 ml-1">{label}</label>
        <input name={name} type={type} defaultValue={defaultValue} maxLength={maxLength} className={`w-full bg-slate-50 dark:bg-neutral-800 border border-slate-200 dark:border-neutral-700 rounded-xl p-3 text-slate-800 dark:text-white focus:border-amber-500 outline-none transition-colors ${isUppercase ? 'uppercase' : ''}`} />
      </div>
    );

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
